<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>March Madness</title>
  <link rel="stylesheet" href="styles.css">
  <script src="scripts.js"></script>
  <style>
    * {
      font-family:'Times New Roman', Times, serif;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 275px);
      margin: 0 auto;
      justify-content: center;
      width: fit-content;
    }
    .grid>* {
      gap: 3px;
    }
    .title {
      border: 2px solid black;
      vertical-align:middle;
      align-content:center;
    }
    .title>:first-child {
      font-weight:bold;
      font-size:xx-large;
      text-align:center;
      word-wrap:normal;
    }
    .calendar {
      display:inline-grid;
      grid-template-rows: 40px auto;
      border: 2px solid black;
      align-items:center;
      justify-content:center;
      padding: 5px;
      font-size:medium;
    }
    .calendar>* {
      text-align:center;
    }
    .calendar>h2:first-child {
      grid-column: 1 / span 7;
      font-weight:bold;
      text-align:center;
      align-items:center;
      font-size: medium;
    }
    .calendar>h3:nth-child(n) {
      font-weight:bold;
    }
    .calendar>span:nth-child(n + 25) {
      background-color:gold;
    }
    .calendar>span:nth-child(n + 41) {
      background-color:white;
    }
    .song {
      border: 2px solid black;
    }
    .grid>.song {
      text-align:center;
      align-content:center;
      padding: 10px;
    }
    .song>header {
      font-weight:bold;
      font-size:large;
      text-align:center;
    }
  </style>
</head>
